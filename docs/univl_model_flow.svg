<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F1E8"/>
      <stop offset="1" stop-color="#E7EEF5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F9FC"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2962FF"/>
      <stop offset="1" stop-color="#5B8CFF"/>
    </linearGradient>
    <linearGradient id="accentGold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B7791F"/>
      <stop offset="1" stop-color="#D69E2E"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1F7A5C"/>
      <stop offset="1" stop-color="#38A169"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#29434E" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#3B5CCC"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#C0841A"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2F855A"/>
    </marker>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1C2733; }
      .subtitle { font: 500 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #51606F; }
      .section { font: 700 20px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1E2A36; }
      .label { font: 700 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #13202B; }
      .body { font: 500 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #475569; }
      .caps { font: 700 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 1.2px; fill: #5B6774; }
      .pill { font: 700 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1440" cy="120" r="180" fill="#FFF7E6" opacity="0.9"/>
  <circle cx="180" cy="870" r="220" fill="#E6F0FF" opacity="0.8"/>

  <text x="80" y="72" class="title">UniVL Current Flow in this Repo</text>
  <text x="80" y="102" class="subtitle">`modules/modeling.py`: BERT text encoder + Visual encoder + BLIP2 QFormer + Flan-T5 caption head</text>

  <rect x="70" y="140" width="1460" height="780" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <text x="110" y="190" class="section">1. Inputs</text>
  <rect x="110" y="215" width="210" height="92" rx="20" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="135" y="250" class="label">Text tokens</text>
  <text x="135" y="275" class="body">`input_ids`, `token_type_ids`,</text>
  <text x="135" y="295" class="body">`attention_mask`</text>

  <rect x="350" y="215" width="220" height="92" rx="20" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <text x="375" y="250" class="label">Video features</text>
  <text x="375" y="275" class="body">`video`, `video_mask`</text>
  <text x="375" y="295" class="body">then `NormalizeVideo`</text>

  <rect x="600" y="215" width="230" height="92" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="625" y="250" class="label">Caption inputs</text>
  <text x="625" y="275" class="body">`input_caption_ids`,</text>
  <text x="625" y="295" class="body">`decoder_mask`, `output_caption_ids`</text>

  <rect x="860" y="215" width="260" height="92" rx="20" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="885" y="250" class="label">Optional pretrain inputs</text>
  <text x="885" y="275" class="body">masked text/video and token/frame labels</text>
  <text x="885" y="295" class="body">for MLM + MFM losses</text>

  <text x="110" y="365" class="section">2. Shared Encoding</text>
  <rect x="120" y="392" width="280" height="120" rx="22" fill="#FFFFFF" stroke="#8FB7FF" stroke-width="2"/>
  <rect x="120" y="392" width="280" height="14" rx="7" fill="url(#accentBlue)"/>
  <text x="145" y="435" class="label">BERT text encoder</text>
  <text x="145" y="462" class="body">`self.bert(...)`</text>
  <text x="145" y="486" class="body">last hidden state = `sequence_output`</text>

  <rect x="470" y="392" width="280" height="120" rx="22" fill="#FFFFFF" stroke="#8FD1A7" stroke-width="2"/>
  <rect x="470" y="392" width="280" height="14" rx="7" fill="url(#accentGreen)"/>
  <text x="495" y="435" class="label">Visual encoder</text>
  <text x="495" y="462" class="body">`self.visual(...)`</text>
  <text x="495" y="486" class="body">last hidden state = `visual_output`</text>

  <line x1="215" y1="307" x2="245" y2="392" stroke="#3B5CCC" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="460" y1="307" x2="585" y2="392" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <rect x="810" y="390" width="650" height="138" rx="24" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="840" y="424" class="caps">STAGE SWITCH</text>
  <text x="840" y="456" class="label">`stage_two = False`</text>
  <text x="1040" y="456" class="body">Only train retrieval-style similarity</text>
  <text x="840" y="488" class="label">`stage_two = True`</text>
  <text x="1040" y="488" class="body">Enable cross branch and caption branch</text>

  <text x="110" y="582" class="section">3. Retrieval / Similarity branch</text>
  <rect x="120" y="610" width="360" height="150" rx="22" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="145" y="646" class="label">Stage 1 path</text>
  <text x="145" y="672" class="body">Mean-pool text/video features</text>
  <text x="145" y="696" class="body">Optional L2 normalize</text>
  <text x="145" y="720" class="body">Dot-product similarity matrix</text>
  <text x="145" y="744" class="body">Loss = MIL-NCE or MaxMargin</text>

  <rect x="520" y="610" width="420" height="150" rx="22" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="545" y="646" class="label">Stage 2 path</text>
  <text x="545" y="672" class="body">`visual_output` -> QFormer query cross-attention</text>
  <text x="545" y="696" class="body">Take pooled query token</text>
  <text x="545" y="720" class="body">`similarity_dense` -> retrieval logits</text>
  <text x="545" y="744" class="body">Loss = `CrossEn()`</text>

  <line x1="260" y1="512" x2="260" y2="610" stroke="#3B5CCC" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="610" y1="512" x2="710" y2="610" stroke="#3B5CCC" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <text x="990" y="582" class="section">4. Caption branch in current code</text>
  <rect x="980" y="610" width="500" height="240" rx="24" fill="#FFFFFF" stroke="#F6AD55" stroke-width="2"/>
  <rect x="980" y="610" width="500" height="16" rx="8" fill="url(#accentGold)"/>
  <text x="1010" y="652" class="label">QFormer -> T5 pipeline</text>
  <text x="1010" y="680" class="body">1. `visual_output` + `video_mask` -> `Qformer.bert(...)`</text>
  <text x="1010" y="706" class="body">2. query states -> `t5_proj`</text>
  <text x="1010" y="732" class="body">3. concat projected visual tokens with text prompt embeddings</text>
  <text x="1010" y="758" class="body">4. feed into frozen `T5ForConditionalGeneration`</text>
  <text x="1010" y="784" class="body">5. train with XE loss, or SCST if enabled</text>
  <text x="1010" y="820" class="small">LoRA is optional; base T5 weights are frozen and cast to bfloat16.</text>

  <line x1="750" y1="452" x2="980" y2="690" stroke="#C0841A" stroke-width="4" marker-end="url(#arrowGold)"/>
  <line x1="715" y1="307" x2="1150" y2="610" stroke="#C0841A" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrowGold)"/>

  <rect x="120" y="810" width="730" height="82" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="145" y="845" class="label">Pretraining-only extras</text>
  <text x="365" y="845" class="body">`do_pretrain=True` adds MLM loss, MFM loss, and joint text-video similarity loss.</text>
  <text x="145" y="870" class="body">Caption loss during pretrain uses masked-video branch outputs; caption finetune uses normal `visual_output`.</text>

  <rect x="900" y="875" width="230" height="34" rx="17" fill="url(#accentBlue)"/>
  <text x="927" y="897" class="pill">Legacy UniVL core</text>
  <rect x="1150" y="875" width="190" height="34" rx="17" fill="url(#accentGold)"/>
  <text x="1183" y="897" class="pill">New caption head</text>
  <rect x="1360" y="875" width="110" height="34" rx="17" fill="url(#accentGreen)"/>
  <text x="1389" y="897" class="pill">Video path</text>
</svg>
