<svg width="1560" height="980" viewBox="0 0 1560 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1560" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#EAF3FA"/>
    </linearGradient>
    <linearGradient id="shared" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1F7A5C"/>
      <stop offset="1" stop-color="#3FAE7A"/>
    </linearGradient>
    <linearGradient id="ce" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C9771D"/>
      <stop offset="1" stop-color="#E3A142"/>
    </linearGradient>
    <linearGradient id="scst" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="eval" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#5B8CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1F2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowShared" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2F855A"/>
    </marker>
    <marker id="arrowCE" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#C9771D"/>
    </marker>
    <marker id="arrowSCST" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowEval" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #17212B; }
      .subtitle { font: 500 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #556270; }
      .section { font: 700 20px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1F2937; }
      .label { font: 700 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #13202B; }
      .body { font: 500 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #475569; }
      .caps { font: 700 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 1.1px; fill: #64748B; }
      .pill { font: 700 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="1560" height="980" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="180" fill="#FFF4D9" opacity="0.7"/>
  <circle cx="170" cy="860" r="220" fill="#E1F0FF" opacity="0.75"/>

  <text x="64" y="70" class="title">Caption Flow After Alignment</text>
  <text x="64" y="100" class="subtitle">`stage_two=True`, caption branch based on QFormer + Flan-T5</text>

  <rect x="48" y="128" width="1464" height="806" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="84" y="160" width="1260" height="164" rx="24" fill="#F3FBF7" stroke="#A7E3BF" stroke-width="2"/>
  <rect x="84" y="160" width="1260" height="16" rx="8" fill="url(#shared)"/>
  <text x="110" y="202" class="section">Shared visual-to-language backbone</text>
  <text x="110" y="226" class="caps">used by CE train, SCST train, and eval generation</text>

  <rect x="110" y="248" width="220" height="50" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="135" y="279" class="body">video, video_mask</text>

  <rect x="370" y="248" width="220" height="50" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="395" y="279" class="body">NormalizeVideo + VisualEncoder</text>

  <rect x="630" y="248" width="220" height="50" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="655" y="279" class="body">QFormer query cross-attention</text>

  <rect x="890" y="248" width="190" height="50" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="922" y="279" class="body">t5_proj</text>

  <rect x="1120" y="248" width="194" height="50" rx="16" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="1145" y="279" class="body">T5 encoder inputs</text>

  <line x1="330" y1="273" x2="370" y2="273" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowShared)"/>
  <line x1="590" y1="273" x2="630" y2="273" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowShared)"/>
  <line x1="850" y1="273" x2="890" y2="273" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowShared)"/>
  <line x1="1080" y1="273" x2="1120" y2="273" stroke="#2F855A" stroke-width="4" marker-end="url(#arrowShared)"/>

  <rect x="84" y="362" width="430" height="460" rx="24" fill="#FFF8EC" stroke="#F6AD55" stroke-width="2"/>
  <rect x="84" y="362" width="430" height="16" rx="8" fill="url(#ce)"/>
  <text x="110" y="402" class="section">CE Train</text>
  <text x="110" y="426" class="caps">teacher forcing only</text>

  <rect x="112" y="456" width="180" height="88" rx="18" fill="#FFFFFF" stroke="#F6AD55" stroke-width="2"/>
  <text x="136" y="490" class="label">Input</text>
  <text x="136" y="514" class="body">GT caption ids</text>
  <text x="136" y="536" class="body">as labels only</text>

  <rect x="310" y="456" width="176" height="88" rx="18" fill="#FFFFFF" stroke="#F6AD55" stroke-width="2"/>
  <text x="334" y="490" class="label">T5 forward</text>
  <text x="334" y="514" class="body">`labels=output_caption_ids`</text>
  <text x="334" y="536" class="body">decoder attends to target</text>

  <rect x="112" y="586" width="374" height="86" rx="18" fill="#FFFFFF" stroke="#F6AD55" stroke-width="2"/>
  <text x="136" y="620" class="label">Loss</text>
  <text x="136" y="644" class="body">Cross-entropy on target caption tokens</text>

  <rect x="112" y="714" width="374" height="76" rx="18" fill="#FFF0D7" stroke="#E3A142" stroke-width="2"/>
  <text x="136" y="746" class="body">No beam search</text>
  <text x="136" y="768" class="body">No `generate()`</text>

  <line x1="292" y1="500" x2="310" y2="500" stroke="#C9771D" stroke-width="4" marker-end="url(#arrowCE)"/>
  <line x1="398" y1="544" x2="398" y2="586" stroke="#C9771D" stroke-width="4" marker-end="url(#arrowCE)"/>
  <line x1="1217" y1="298" x2="398" y2="456" stroke="#C9771D" stroke-width="4" marker-end="url(#arrowCE)"/>

  <rect x="564" y="362" width="430" height="460" rx="24" fill="#F7F2FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="564" y="362" width="430" height="16" rx="8" fill="url(#scst)"/>
  <text x="590" y="402" class="section">SCST Train</text>
  <text x="590" y="426" class="caps">reinforcement-style caption training</text>

  <rect x="592" y="456" width="176" height="88" rx="18" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="616" y="490" class="label">Generate</text>
  <text x="616" y="514" class="body">`t5_model.generate(...)`</text>
  <text x="616" y="536" class="body">beam search</text>

  <rect x="786" y="456" width="180" height="88" rx="18" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="810" y="490" class="label">Candidates</text>
  <text x="810" y="514" class="body">`num_beams = beam_size`</text>
  <text x="810" y="536" class="body">multiple captions</text>

  <rect x="592" y="586" width="374" height="86" rx="18" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="616" y="620" class="label">Reward</text>
  <text x="616" y="644" class="body">CIDEr reward + baseline from generated captions</text>

  <rect x="592" y="714" width="374" height="76" rx="18" fill="#EFE7FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="616" y="746" class="body">Beam is part of training here</text>
  <text x="616" y="768" class="body">because reward depends on generated outputs</text>

  <line x1="768" y1="500" x2="786" y2="500" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrowSCST)"/>
  <line x1="876" y1="544" x2="876" y2="586" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrowSCST)"/>
  <line x1="1217" y1="298" x2="780" y2="456" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrowSCST)"/>

  <rect x="1044" y="362" width="430" height="460" rx="24" fill="#EEF5FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="1044" y="362" width="430" height="16" rx="8" fill="url(#eval)"/>
  <text x="1070" y="402" class="section">Eval</text>
  <text x="1070" y="426" class="caps">validation loss + generated captions</text>

  <rect x="1072" y="454" width="176" height="96" rx="18" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1096" y="488" class="label">Val loss</text>
  <text x="1096" y="512" class="body">call `model(...)`</text>
  <text x="1096" y="534" class="body">teacher-forcing CE loss</text>

  <rect x="1266" y="454" width="180" height="96" rx="18" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1290" y="488" class="label">Generation</text>
  <text x="1290" y="512" class="body">call `generate_caption_ids()`</text>
  <text x="1290" y="534" class="body">inside it uses `T5.generate()`</text>

  <rect x="1072" y="592" width="374" height="92" rx="18" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1096" y="626" class="label">Decode mode</text>
  <text x="1096" y="650" class="body">Usually beam search if `beam_size > 1`</text>
  <text x="1096" y="672" class="body">Greedy decode if `beam_size = 1`</text>

  <rect x="1072" y="714" width="374" height="76" rx="18" fill="#DDEBFF" stroke="#60A5FA" stroke-width="2"/>
  <text x="1096" y="746" class="body">Generated captions are scored by BLEU/CIDEr/... in evaluator</text>
  <text x="1096" y="768" class="body">No old manual beam loop anymore</text>

  <line x1="1248" y1="502" x2="1266" y2="502" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowEval)"/>
  <line x1="1356" y1="550" x2="1356" y2="592" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowEval)"/>
  <line x1="1217" y1="298" x2="1356" y2="454" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowEval)"/>

  <rect x="84" y="852" width="1390" height="48" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="110" y="882" class="small">Summary: CE train = no beam, no generate. SCST train = beam + generate. Eval = CE validation loss plus generated captions, usually beam if configured.</text>

  <rect x="1218" y="62" width="90" height="30" rx="15" fill="url(#shared)"/>
  <text x="1240" y="81" class="pill">Shared</text>
  <rect x="1320" y="62" width="90" height="30" rx="15" fill="url(#ce)"/>
  <text x="1349" y="81" class="pill">CE</text>
  <rect x="1422" y="62" width="90" height="30" rx="15" fill="url(#scst)"/>
  <text x="1445" y="81" class="pill">SCST</text>
</svg>
